<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TableOS Verification</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      width: 100% !important;
      background-color: #fffbf5;
      background-size: 24px 24px;
      padding: 40px 0;
      font-family: &quot;Inter&quot;, Helvetica, Arial, sans-serif;
    "
  >
    <center>
      <table
        role="presentation"
        border="0"
        cellpadding="0"
        cellspacing="0"
        width="100%"
        style="max-width: 500px; margin: auto"
      >
        <tr>
          <td style="padding: 20px">
            <table
              role="presentation"
              border="0"
              cellpadding="0"
              cellspacing="0"
              width="100%"
              style="
                background: #ffffff;
                border: 1px solid #e5e2e2;
                border-radius: 12px;
                overflow: hidden;
              "
            >
              <tr>
                <td style="padding: 32px 32px 10px 32px; text-align: center">
                  <img
                    src="{{LOGO}}"
                    alt="TableOS"
                    width="40"
                    style="display: block; margin: 0 auto 0px auto"
                  />
                  <h2
                    style="
                      margin: 0;
                      font-size: 18px;
                      font-weight: 500;
                      letter-spacing: -0.5px;
                      color: #000000;
                    "
                  >
                    tableOS
                  </h2>
                </td>
              </tr>

              <tr>
                <td style="padding: 20px 32px 40px 32px; text-align: center">
                  <p
                    style="
                      text-transform: uppercase;
                      font-size: 11px;
                      font-weight: 700;
                      letter-spacing: 2px;
                      color: #666;
                      margin-bottom: 8px;
                    "
                  >
                    Get your OTP
                  </p>
                  <h1
                    style="
                      font-size: 20px;
                      font-weight: 900;
                      color: #000000;
                      margin: 0 0 16px 0;
                      line-height: 1.1;
                    "
                  >
                    Continue your Session!
                  </h1>
                  <p
                    style="
                      font-size: 14px;
                      color: #4b5563;
                      line-height: 1.6;
                      margin-bottom: 30px;
                    "
                  >
                    Copy the code below to complete your login. <br />
                    This code expires in 10 minutes.
                  </p>

                  <div
                    style="
                      background: #f9fafb;
                      border: 1px dashed #000000;
                      border-radius: 8px;
                      padding: 16px;
                    "
                  >
                    <div
                      style="
                        font-family: &quot;Courier New&quot;, monospace;
                        font-size: 42px;
                        font-weight: 900;
                        letter-spacing: 8px;
                        color: #000000;
                      "
                    >
                      {{OTP}}
                    </div>
                  </div>
                </td>
              </tr>

              <tr>
                <td
                  style="
                    background: #000000;
                    padding: 20px 0px;
                    text-align: center;
                  "
                >
                  <table
                    role="presentation"
                    border="0"
                    cellpadding="0"
                    cellspacing="0"
                    width="100%"
                  >
                    <tr>
                      <td
                        align="center"
                        style="
                          font-size: 11px;
                          color: #888888;
                          text-transform: uppercase;
                          letter-spacing: 1px;
                          font-weight: 700;
                        "
                      >
                        <a
                          href="{{URL}}"
                          style="color: #ffffff; text-decoration: none"
                          >Website</a
                        >
                        <span style="margin: 0 10px; color: #333333"
                          >&bull;</span
                        >
                        <a
                          href="{{URL}}/contact"
                          style="color: #ffffff; text-decoration: none"
                          >Contact</a
                        >
                        <span style="margin: 0 10px; color: #333333"
                          >&bull;</span
                        >
                        <a
                          href="{{URL}}/about"
                          style="color: #ffffff; text-decoration: none"
                          >About</a
                        >
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>

            <table
              role="presentation"
              border="0"
              cellpadding="0"
              cellspacing="0"
              width="100%"
              style="margin-top: 20px"
            >
              <tr>
                <td style="text-align: center; color: #9ca3af; font-size: 12px">
                  <p>© 2026 TableOS. All rights reserved.</p>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </center>
  </body>
</html>
